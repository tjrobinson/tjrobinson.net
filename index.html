<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>tjrobinson.net</title>
    <meta
      name="description"
      content="Tom Robinson — notes, posts, and projects."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* palette mirrors the dark theme of the Quartz site at /content/ */
      :root {
        --bg: #15181a;
        --panel: #1b2023;
        --border: #2e3438;
        --text: #e9edee;
        --body: #c9d1d3;
        --muted: #8a959c;
        --accent: #5cc9b8;
        --accent-bright: #7fe0cd;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--body);
        display: grid;
        place-items: center;
        padding: 2.5rem 1.5rem;
        position: relative;
        overflow-x: hidden;
      }

      /* soft teal glow behind the header */
      body::before {
        content: "";
        position: fixed;
        top: -20vh;
        left: 50%;
        transform: translateX(-50%);
        width: 60rem;
        height: 60vh;
        background: radial-gradient(
          ellipse at center,
          rgba(92, 201, 184, 0.09),
          transparent 65%
        );
        pointer-events: none;
      }

      main {
        width: 100%;
        max-width: 40rem;
        position: relative;
      }

      h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(2.1rem, 6vw, 2.8rem);
        font-weight: 700;
        color: var(--text);
        margin: 0 0 0.75rem;
        letter-spacing: -0.02em;
      }

      h1 .dot-net {
        color: var(--accent);
      }

      .lead {
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--muted);
        margin: 0 0 2.25rem;
      }

      .cards {
        display: grid;
        gap: 0.9rem;
      }

      .card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1.15rem 1.35rem;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        text-decoration: none;
        transition:
          border-color 0.15s ease,
          background-color 0.15s ease,
          transform 0.15s ease;
      }

      .card:hover,
      .card:focus-visible {
        border-color: var(--accent);
        transform: translateY(-2px);
      }

      .card:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .card h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--text);
        margin: 0 0 0.25rem;
      }

      .card p {
        font-size: 0.9rem;
        line-height: 1.5;
        color: var(--muted);
        margin: 0;
      }

      .card .arrow {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.2rem;
        color: var(--accent);
        flex-shrink: 0;
        transition: transform 0.15s ease;
      }

      .card:hover .arrow {
        transform: translateX(4px);
        color: var(--accent-bright);
      }
    </style>
  </head>

  <body>
    <main>
      <h1>tjrobinson<span class="dot-net">.net</span></h1>
      <p class="lead">The personal site of Tom Robinson.</p>
      <nav class="cards" aria-label="Site sections">
        <a class="card" href="/content/">
          <span>
            <h2>Content</h2>
            <p>
              Notes on software development, cloud, security, and other topics.
            </p>
          </span>
          <span class="arrow" aria-hidden="true">&rarr;</span>
        </a>
        <a class="card" href="https://www.github.com/tjrobinson">
          <span>
            <h2>GitHub</h2>
            <p>Repositories and code.</p>
          </span>
          <span class="arrow" aria-hidden="true">&rarr;</span>
        </a>
      </nav>
    </main>
  </body>
</html>
