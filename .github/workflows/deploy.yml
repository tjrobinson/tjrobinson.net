name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Lint and Typecheck
        run: npm run check
      - name: Lint content
        run: npm run lint:content
        continue-on-error: true
      - name: Fetch bookmarks
        env:
          BOOKMARKS_GITHUB_TOKEN: ${{ secrets.BOOKMARKS_GITHUB_TOKEN }}
        run: npm run fetch:bookmarks
      - name: Build Quartz
        run: npx quartz build -d content -o public/content
      - name: Copy root pages
        run: |
          mkdir -p public
          cp index.html public/
          cp CNAME public/
          cp robots.txt public/
          cp public/content/404.html public/404.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Fetch bookmarks
        env:
          BOOKMARKS_GITHUB_TOKEN: ${{ secrets.BOOKMARKS_GITHUB_TOKEN }}
        run: npm run fetch:bookmarks
      - name: Run unit tests
        run: npm test
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy:
    needs: [build, test]
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
